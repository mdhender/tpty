baseURL: "https://example.org/"
title: T'Pty

enableInlineShortcodes: true
enableRobotsTXT: true
enableGitInfo: true

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Documentation
      pageRef: /docs
      weight: 1
    - name: Search
      weight: 2
      params:
        type: search
    - name: GitHub
      weight: 3
      url: "https://github.com/mdhender/tpty"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: true
  theme:
    default: system
    displayToggle: true
  editURL:
    enable: false
