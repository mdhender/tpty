baseURL: "https://tpty.pbbgaming.com/"
title: T'Pty

enableInlineShortcodes: true
enableRobotsTXT: true
enableGitInfo: true

module:
  imports:
    - path: github.com/imfing/hextra
  # Override Hugo's default "data" mount so it does NOT scan the project-root
  # data/ directory, which holds the game engine's data (world.json, world.wxx,
  # ...), not Hugo data files. Without this, Hugo tries to unmarshal
  # data/**/*.wxx and the build fails. We point the data mount at an empty,
  # tracked directory instead. All other default mounts (content, static, ...)
  # and Hextra's own icon data are unaffected.
  mounts:
    - source: hugo-data
      target: data

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Tutorials
      pageRef: /docs/tutorials
      weight: 1
    - name: Explanation
      pageRef: /docs/explanation
      weight: 2
    - name: How-To
      pageRef: /docs/how-to
      weight: 3
    - name: Reference
      pageRef: /docs/reference
      weight: 4
    - name: Search
      weight: 5
      params:
        type: search
    - name: GitHub
      weight: 6
      url: "https://github.com/mdhender/tpty"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: true
  theme:
    default: system
    displayToggle: true
  editURL:
    enable: false
