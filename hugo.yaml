baseURL: "https://tpty.pbbgaming.com/"
title: T'Pty

enableInlineShortcodes: true
enableRobotsTXT: true
enableGitInfo: true

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Tutorials
      pageRef: /docs/tutorials
      weight: 1
    - name: Explanation
      pageRef: /docs/explanation
      weight: 2
    - name: How-To
      pageRef: /docs/how-to
      weight: 3
    - name: Reference
      pageRef: /docs/reference
      weight: 4
    - name: Search
      weight: 5
      params:
        type: search
    - name: GitHub
      weight: 6
      url: "https://github.com/mdhender/tpty"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: true
  theme:
    default: system
    displayToggle: true
  editURL:
    enable: false
